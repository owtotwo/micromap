---
# yamllint disable rule:line-length
name: examples
'on':
  push:
  pull_request:
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true
jobs:
  run-examples:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - id: list-examples
        # For now we only identify single .rs file examples, and will not consider the examples
        # listed in cargo.toml or complex examples in the form of Cargo workspace folders.
        run: echo "examples=$(ls examples/*.rs | xargs -n 1 basename | sed 's/\.rs//')" >> $GITHUB_ENV
      - run: |
          for example in ${{ env.examples }}; do
            cargo --color=never run --example $example
          done
